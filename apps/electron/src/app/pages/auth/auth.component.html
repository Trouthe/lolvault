<div class="auth-bg" [class.reveal-auth]="showAuth()">
  <main class="auth-stage">
    <div class="brand-sequence" [class.compact]="showAuth()" aria-hidden="true">
      <svg class="brand-mark" viewBox="0 0 1675 1675" role="img" aria-label="LoL Vault emblem">
        <path
          class="brand-path outer"
          d="M 790.875 426.573 C 826.292 407.798 861.708 407.798 897.125 426.573 L 1215.875 595.544 C 1251.292 614.319 1269 642.48 1269 680.029 L 1269 1017.971 C 1269 1055.52 1251.292 1083.682 1215.875 1102.456 L 897.125 1271.427 C 861.708 1290.202 826.292 1290.202 790.875 1271.427 L 472.125 1102.456 C 436.708 1083.681 419 1055.52 419 1017.971 L 419 680.029 C 419 642.48 436.708 614.318 472.125 595.544 Z M 269.001 544.19 L 269.001 1153.81 L 844 1458.62 L 1418.999 1153.81 L 1418.999 544.19 L 844 239.38 Z"
        ></path>
        <path
          class="brand-path inner"
          d="M 809.625 575.664 C 832.542 563.516 855.458 563.516 878.375 575.664 L 1084.625 684.998 C 1107.542 697.146 1119 715.369 1119 739.665 L 1119 958.334 C 1119 982.631 1107.542 1000.853 1084.625 1013.001 L 878.375 1122.335 C 855.458 1134.483 832.542 1134.483 809.625 1122.335 L 603.375 1013.001 C 580.458 1000.853 569 982.63 569 958.334 L 569 739.666 C 569 715.369 580.458 697.147 603.375 684.999 Z M 719 782.737 L 719 915.263 L 844 981.526 L 969 915.263 L 969 782.737 L 844 716.474 Z"
        ></path>
      </svg>
    </div>

    <section class="auth-panel" [class.visible]="showAuth()">
      <h1 class="auth-title">LoL Vault</h1>

      <button class="gsi-material-button" (click)="onGoogleSignIn()" [disabled]="loading()">
        <div class="gsi-material-button-state"></div>
        <div class="gsi-material-button-content-wrapper">
          <div class="gsi-material-button-icon">
            <svg
              version="1.1"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 48 48"
              style="display: block"
            >
              <path
                fill="#EA4335"
                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
              ></path>
              <path
                fill="#4285F4"
                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
              ></path>
              <path
                fill="#FBBC05"
                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
              ></path>
              <path
                fill="#34A853"
                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
              ></path>
              <path fill="none" d="M0 0h48v48H0z"></path>
            </svg>
          </div>
          <span class="gsi-material-button-contents">Continue with Google</span>
          <span style="display: none">Continue with Google</span>
        </div>
      </button>

      @if (error()) {
        <p class="auth-error">{{ error() }}</p>
      }
    </section>
  </main>
</div>
