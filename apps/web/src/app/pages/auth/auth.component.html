<div class="auth-bg">
  <div class="auth-glow"></div>

  <main class="auth-card">
    <!-- Header -->
    <header class="auth-header">
      <img src="LV-no-bg_light.svg" alt="LoL Vault" class="auth-logo" />
      <h1 class="auth-title">LoL Vault</h1>
      <p class="auth-subtitle">
        {{
          isLogin()
            ? 'Secure access to your operational data.'
            : 'Create your account to get started.'
        }}
      </p>
    </header>

    <div class="auth-body">
      <!-- Google -->
      <div class="auth-section">
        <button class="gsi-material-button" (click)="onGoogleSignIn()" [disabled]="loading()">
          <div class="gsi-material-button-state"></div>
          <div class="gsi-material-button-content-wrapper">
            <div class="gsi-material-button-icon">
              <svg
                version="1.1"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 48 48"
                style="display: block"
              >
                <path
                  fill="#EA4335"
                  d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
                ></path>
                <path
                  fill="#4285F4"
                  d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
                ></path>
                <path
                  fill="#FBBC05"
                  d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
                ></path>
                <path
                  fill="#34A853"
                  d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
                ></path>
                <path fill="none" d="M0 0h48v48H0z"></path>
              </svg>
            </div>
            <span class="gsi-material-button-contents">Continue with Google</span>
            <span style="display: none">Continue with Google</span>
          </div>
        </button>
      </div>

      <!-- Divider -->
      <div class="auth-divider">
        <div class="divider-line"></div>
        <span class="divider-label">or</span>
        <div class="divider-line"></div>
      </div>

      <!-- Email form -->
      <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-field">
          <label class="field-label" for="email">Email Address</label>
          <div class="input-wrapper">
            <svg
              class="input-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
            <input
              id="email"
              type="email"
              class="form-input"
              formControlName="email"
              placeholder="placeholder@email.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-field">
          <div class="field-label-row">
            <label class="field-label" for="password">Password</label>
            @if (isLogin()) {
              <button type="button" class="forgot-link" (click)="onForgotPassword()">
                Forgot?
              </button>
            }
          </div>
          <div class="input-wrapper">
            <svg
              class="input-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="16" r="1" />
              <rect x="3" y="10" width="18" height="12" rx="2" />
              <path d="M7 10V7a5 5 0 0 1 10 0v3" />
            </svg>
            <input
              id="password"
              type="password"
              class="form-input"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>
        </div>

        @if (error()) {
          <p class="auth-error">{{ error() }}</p>
        }

        <button class="btn-primary" type="submit" [disabled]="loading()">
          @if (loading()) {
            Processing...
          } @else {
            Contine
          }
        </button>
      </form>
    </div>
  </main>
</div>
